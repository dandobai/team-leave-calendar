version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: excite-postgres
    environment:
      POSTGRES_DB: leave_management
      POSTGRES_USER: excite_user
      POSTGRES_PASSWORD: excite_secure_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - excite-network

  backend-api:
    build:
      context: ./backend/leave-calendar
      dockerfile: Dockerfile
    container_name: excite-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/leave_management
      - SPRING_DATASOURCE_USERNAME=excite_user
      - SPRING_DATASOURCE_PASSWORD=excite_secure_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres-db
    networks:
      - excite-network

  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: excite-frontend
    ports:
      - "80:80"
    depends_on:
      - backend-api
    networks:
      - excite-network

volumes:
  pgdata:

networks:
  excite-network:
    driver: bridge
